.card{

}

/* Inputs */
label{

  font-size:14px;
}

input, textarea{
  width:100%;
  padding:10px;
  border:1px solid #ccc;
  border-radius:6px;

}

textarea{

  resize:none;
}

/* Row */
.row{
  display:flex;
  gap:15px;
}

.row .col{

}

/* Button */
.btn{
  margin-top:15px;
  background:#2d4d3a;
  color:white;
  padding:10px 20px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

/* Validation */
.error{
  color:#ff9800;
  font-size:13px;
  margin-top:5px;
}
