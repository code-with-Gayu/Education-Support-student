<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Create Account</title>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  background: linear-gradient(135deg, #94c2cd, #6dd5ed);
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}

/* Container */
.container{
  width:100%;
  max-width:400px;
  padding:20px;
}

/* Heading */
.header{
  text-align:center;
  margin-bottom:20px;
}

.header h1{
  color:#2f5d50;
}

.header p{
  color:#666;
  font-size:14px;
}

/* Form Box */
.form-box{
  background:white;
  padding:25px;
  border-radius:10px;
  box-shadow:0 5px 20px rgba(0, 0, 0, 0.1);

  animation:fadeUp 0.8s ease;
}

/* Input group */
.input-group{
  margin-bottom:15px;
}

.input-group label{
  display:block;
  margin-bottom:5px;
  font-size:14px;
}

.input-group input,
.input-group select{
  width:100%;
  padding:10px;
  border:1px solid #ccc;
  border-radius:6px;
  outline:none;
  transition:0.3s;
}

.input-group input:focus,
.input-group select:focus{
  border-color:#2f5d50;
}

/* Button */
.btn{
  width:100%;
  padding:12px;
  border:none;
  border-radius:6px;
  background:#2f5d50;
  color:white;
  font-size:16px;
  cursor:pointer;
  transition:0.3s;
}

.btn:hover{
  background:#24473c;
  transform:scale(1.03);
  color: rgb(6, 6, 6);
}

/* Footer */
.footer{
  text-align:center;
  margin-top:15px;
  font-size:14px;
}

.footer a{
  color:#2f5d50;
  text-decoration:none;
  font-weight:500;
}

/* Animation */
@keyframes fadeUp{
  from{
    opacity:0;
    transform:translateY(30px);
  }
  to{
    opacity:1;
    transform:translateY(0);
  }
}

/* Responsive */
@media(max-width:480px){
  .form-box{
    padding:20px;
  }
}
</style>
</head>

<body>

<div class="container">

  <!-- Heading -->
  <div class="header">
    <h1> 🎓EducationSupport</h1>
    <p>Create your account</p>
  </div>

  <!-- Form -->
  <div class="form-box">
    <form>

      <div class="input-group">
        <label>Full Name</label>
        <input type="text" placeholder="Enter your name">
      </div>

      <div class="input-group">
        <label>Email</label>
        <input type="email" placeholder="Enter your email">
      </div>

      <div class="input-group">
        <label>Password</label>
        <input type="password" placeholder="Enter password">
      </div>

      <!-- Dropdown Filter -->
      <div class="input-group">
        <label>I am a...</label>
        <select>
          <option>Student</option>
          <option>Donor</option>
          <option>Education Institution</option>
        </select>
      </div>

      <button class="btn">Create Account</button>

    </form>

    <div class="footer">
      Already have an account? <a href="#">Login</a>
    </div>

  </div>

</div>

</body>
</html>
